services:
  db:
    image: postgres:16
    container_name: postgres-ecommerce

    restart: always

    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  liquibase:
    image: liquibase/liquibase:latest
    container_name: liquibase-ecommerce
    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./database:/liquibase/changelog
      - ./liquibase.properties:/liquibase/liquibase.properties

    working_dir: /liquibase
    command: update

volumes:
  postgres_data:
